name: Release

on:
  push:
    branches:
      - main
      - master
    paths:
      - "client-app/**"
      - "launcher-app/**"
      - "designer-client/**"
      - "sim-core/**"
      - "tooling-core/**"
      - "assets/content/**"
      - "scripts/**"
      - "tools/package_client_app_release.py"
      - "tools/package_designer_client_release.py"
      - "tools/build_runtime_delta.py"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: [self-hosted, windows, x64, aop-release]
    env:
      GCS_RELEASE_BUCKET: ${{ vars.KARAXAS_GCS_RELEASE_BUCKET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preflight Release Inputs
        id: preflight
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command ". '{0}'"
        run: |
          $gamePrefix = "${{ vars.KARAXAS_GCS_GAME_RELEASE_PREFIX }}"
          if ([string]::IsNullOrWhiteSpace($gamePrefix)) {
            $gamePrefix = "win-game"
          }
          $designerPrefix = "${{ vars.KARAXAS_GCS_DESIGNER_RELEASE_PREFIX }}"
          if ([string]::IsNullOrWhiteSpace($designerPrefix)) {
            $designerPrefix = "win-designer"
          }
          $hasBucket = -not [string]::IsNullOrWhiteSpace("${{ env.GCS_RELEASE_BUCKET }}")
          if ($hasBucket) {
            "enabled=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            "game_prefix=$gamePrefix" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            "designer_prefix=$designerPrefix" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            "game_feed_url=https://storage.googleapis.com/${{ env.GCS_RELEASE_BUCKET }}/$gamePrefix" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            "designer_feed_url=https://storage.googleapis.com/${{ env.GCS_RELEASE_BUCKET }}/$designerPrefix" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          } else {
            Write-Host "Missing KARAXAS_GCS_RELEASE_BUCKET variable. Release workflow will skip publishing."
            "enabled=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            "game_prefix=$gamePrefix" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            "designer_prefix=$designerPrefix" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            "game_feed_url=" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            "designer_feed_url=" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          }

      - name: Resolve Auth Mode
        id: auth-mode
        if: steps.preflight.outputs.enabled == 'true'
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command ". '{0}'"
        run: |
          if ("${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}" -ne "" -and "${{ secrets.GCP_SERVICE_ACCOUNT }}" -ne "") {
            "mode=wif" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          } else {
            "mode=none" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          }

      - name: Authenticate to Google Cloud (WIF)
        if: steps.preflight.outputs.enabled == 'true' && steps.auth-mode.outputs.mode == 'wif'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        if: steps.preflight.outputs.enabled == 'true' && steps.auth-mode.outputs.mode != 'none'
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command ". '{0}'"
        run: |
          $knownBins = @(
            "C:\Program Files (x86)\Google\Cloud SDK\google-cloud-sdk\bin",
            "C:\Program Files\Google\Cloud SDK\google-cloud-sdk\bin"
          )

          $gcloud = Get-Command gcloud -ErrorAction SilentlyContinue
          if (-not $gcloud) {
            $components = Invoke-RestMethod -Uri "https://dl.google.com/dl/cloudsdk/channels/rapid/components-2.json"
            $version = "$($components.version)"
            if ([string]::IsNullOrWhiteSpace($version)) {
              throw "Unable to resolve Cloud SDK version from components manifest."
            }
            $archiveUrl = "https://dl.google.com/dl/cloudsdk/channels/rapid/downloads/google-cloud-sdk-$version-windows-x86_64-bundled-python.zip"
            $zipPath = Join-Path $env:RUNNER_TEMP "google-cloud-sdk-$version.zip"
            $toolRoot = $env:RUNNER_TOOL_CACHE
            if ([string]::IsNullOrWhiteSpace($toolRoot)) {
              $toolRoot = Join-Path $env:USERPROFILE ".aop-toolcache"
            }
            New-Item -ItemType Directory -Path $toolRoot -Force | Out-Null
            $installRoot = Join-Path $toolRoot "google-cloud-sdk-$version"
            $portableBin = Join-Path $installRoot "google-cloud-sdk\bin"

            if (-not (Test-Path $portableBin)) {
              if (-not (Test-Path $zipPath)) {
                Invoke-WebRequest -UseBasicParsing -Uri $archiveUrl -OutFile $zipPath
              }
              Expand-Archive -Path $zipPath -DestinationPath $installRoot -Force
              if (-not (Test-Path $portableBin)) {
                throw "Cloud SDK bootstrap did not produce expected bin path: $portableBin"
              }
            } else {
              Write-Host "Using cached Cloud SDK from $portableBin"
            }
            Add-Content -Path $env:GITHUB_PATH -Value $portableBin
            $env:Path = "$portableBin;$env:Path"
          }

          foreach ($binPath in $knownBins) {
            if (Test-Path $binPath) {
              Add-Content -Path $env:GITHUB_PATH -Value $binPath
            }
          }

          $gcloud = Get-Command gcloud -ErrorAction SilentlyContinue
          if (-not $gcloud) {
            throw "gcloud CLI not found after bootstrap."
          }

          gcloud --version

      - name: Compute Version
        id: get-version
        if: steps.preflight.outputs.enabled == 'true' && steps.auth-mode.outputs.mode != 'none'
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command ". '{0}'"
        run: |
          $version = "1.0.$env:GITHUB_RUN_NUMBER"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Setup Rust
        if: steps.preflight.outputs.enabled == 'true' && steps.auth-mode.outputs.mode != 'none'
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command ". '{0}'"
        run: |
          $rustup = Get-Command rustup -ErrorAction SilentlyContinue
          if (-not $rustup) {
            $cargoBin = Join-Path $env:USERPROFILE ".cargo\bin"
            $rustupExe = Join-Path $cargoBin "rustup.exe"
            if (-not (Test-Path $rustupExe)) {
              $installer = Join-Path $env:RUNNER_TEMP "rustup-init.exe"
              Invoke-WebRequest -UseBasicParsing -Uri "https://win.rustup.rs/x86_64" -OutFile $installer
              & $installer -y --default-toolchain stable --profile minimal --target x86_64-pc-windows-msvc
              if ($LASTEXITCODE -ne 0) {
                throw "Rustup bootstrap failed with exit code $LASTEXITCODE"
              }
            }
            Add-Content -Path $env:GITHUB_PATH -Value $cargoBin
            $env:Path = "$cargoBin;$env:Path"
          }

          rustup toolchain install stable
          rustup default stable
          rustup target add x86_64-pc-windows-msvc
          rustc --version
          cargo --version

      - name: Setup Python
        if: steps.preflight.outputs.enabled == 'true' && steps.auth-mode.outputs.mode != 'none'
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command ". '{0}'"
        run: |
          $python = Get-Command python -ErrorAction SilentlyContinue
          if ($python) {
            $version = & python --version
            if (-not ($version -match '^Python 3\.11(\.|$)')) {
              throw "Python 3.11 is required, found: $version"
            }
          } else {
            $py = Get-Command py -ErrorAction SilentlyContinue
            if ($py) {
              & py -3.11 --version
            }

            if (-not $py -or $LASTEXITCODE -ne 0) {
              $pyVersion = "3.11.9"
              $embedZip = Join-Path $env:RUNNER_TEMP "python-$pyVersion-embed-amd64.zip"
              $toolRoot = $env:RUNNER_TOOL_CACHE
              if ([string]::IsNullOrWhiteSpace($toolRoot)) {
                $toolRoot = Join-Path $env:USERPROFILE ".aop-toolcache"
              }
              New-Item -ItemType Directory -Path $toolRoot -Force | Out-Null
              $installDir = Join-Path $toolRoot "python-$pyVersion"
              $pythonExe = Join-Path $installDir "python.exe"
              if (-not (Test-Path $pythonExe)) {
                $uri = "https://www.python.org/ftp/python/$pyVersion/python-$pyVersion-embed-amd64.zip"
                Invoke-WebRequest -UseBasicParsing -Uri $uri -OutFile $embedZip
                if (Test-Path $installDir) {
                  Remove-Item -Path $installDir -Recurse -Force
                }
                Expand-Archive -Path $embedZip -DestinationPath $installDir -Force

                $pthPath = Join-Path $installDir "python311._pth"
                if (Test-Path $pthPath) {
                  $pth = Get-Content $pthPath
                  $patched = $pth | ForEach-Object {
                    if ($_ -eq "#import site") { "import site" } else { $_ }
                  }
                  Set-Content -Path $pthPath -Value $patched -Encoding ascii
                }

                $getPip = Join-Path $env:RUNNER_TEMP "get-pip.py"
                Invoke-WebRequest -UseBasicParsing -Uri "https://bootstrap.pypa.io/get-pip.py" -OutFile $getPip
                & $pythonExe $getPip --disable-pip-version-check
                if ($LASTEXITCODE -ne 0) {
                  throw "Embedded Python pip bootstrap failed with exit code $LASTEXITCODE."
                }
              } else {
                Write-Host "Using cached Python at $pythonExe"
              }

              $pyShimDir = Join-Path $env:RUNNER_TEMP "python-local-shims"
              New-Item -ItemType Directory -Path $pyShimDir -Force | Out-Null
              Set-Content -Path (Join-Path $pyShimDir "python.cmd") -Value "@echo off`r`n\"$pythonExe\" %*" -Encoding ascii
              Set-Content -Path (Join-Path $pyShimDir "pip.cmd") -Value "@echo off`r`n\"$pythonExe\" -m pip %*" -Encoding ascii
              Add-Content -Path $env:GITHUB_PATH -Value $pyShimDir
              $env:Path = "$pyShimDir;$env:Path"
            } else {
              $shimDir = Join-Path $env:RUNNER_TEMP "python-shims"
              New-Item -ItemType Directory -Path $shimDir -Force | Out-Null
              Set-Content -Path (Join-Path $shimDir "python.cmd") -Value "@echo off`r`npy -3.11 %*" -Encoding ascii
              Set-Content -Path (Join-Path $shimDir "pip.cmd") -Value "@echo off`r`npy -3.11 -m pip %*" -Encoding ascii
              Add-Content -Path $env:GITHUB_PATH -Value $shimDir
              $env:Path = "$shimDir;$env:Path"
            }
          }

          python --version
          python -m pip --version *> $null
          if ($LASTEXITCODE -ne 0) {
            $getPip = Join-Path $env:RUNNER_TEMP "get-pip.py"
            Invoke-WebRequest -UseBasicParsing -Uri "https://bootstrap.pypa.io/get-pip.py" -OutFile $getPip
            python $getPip --disable-pip-version-check
            if ($LASTEXITCODE -ne 0) {
              throw "Pip bootstrap failed with exit code $LASTEXITCODE."
            }
          }
          python -m pip --version

      - name: Setup NSIS
        if: steps.preflight.outputs.enabled == 'true' && steps.auth-mode.outputs.mode != 'none'
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command ". '{0}'"
        run: |
          $knownBins = @(
            "C:\Program Files (x86)\NSIS",
            "C:\Program Files\NSIS"
          )
          $makensis = Get-Command makensis -ErrorAction SilentlyContinue
          if (-not $makensis) {
            foreach ($candidate in $knownBins) {
              $exe = Join-Path $candidate "makensis.exe"
              if (Test-Path $exe) {
                Add-Content -Path $env:GITHUB_PATH -Value $candidate
                $env:Path = "$candidate;$env:Path"
                break
              }
            }
          }

          $makensis = Get-Command makensis -ErrorAction SilentlyContinue
          if (-not $makensis) {
            $nsisVersion = "3.11"
            $nsisZip = Join-Path $env:RUNNER_TEMP "nsis-$nsisVersion.zip"
            $nsisRoot = Join-Path $env:RUNNER_TEMP "nsis-$nsisVersion"
            if (Test-Path $nsisRoot) {
              Remove-Item -Path $nsisRoot -Recurse -Force
            }
            Invoke-WebRequest -UseBasicParsing -Uri "https://sourceforge.net/projects/nsis/files/NSIS%203/$nsisVersion/nsis-$nsisVersion.zip/download" -OutFile $nsisZip
            Expand-Archive -Path $nsisZip -DestinationPath $nsisRoot -Force
            $portableBin = Join-Path $nsisRoot "nsis-$nsisVersion"
            $portableExe = Join-Path $portableBin "makensis.exe"
            if (-not (Test-Path $portableExe)) {
              throw "NSIS bootstrap failed: missing $portableExe"
            }
            Add-Content -Path $env:GITHUB_PATH -Value $portableBin
            $env:Path = "$portableBin;$env:Path"
          }

          makensis /VERSION

      - name: Auth/session continuity gate
        if: steps.preflight.outputs.enabled == 'true' && steps.auth-mode.outputs.mode != 'none'
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command ". '{0}'"
        env:
          PYTHONPATH: backend
        run: |
          pip install -r backend/requirements.txt
          pip install pytest
          python -m pytest -q backend/tests/test_security_edges.py backend/tests/test_publish_drain.py

      - name: Build Rust Game Client Runtime (Windows)
        if: steps.preflight.outputs.enabled == 'true' && steps.auth-mode.outputs.mode != 'none'
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command ". '{0}'"
        run: |
          cargo build -p client-app --release --features bootstrap-shell --target x86_64-pc-windows-msvc

      - name: Build Rust Launcher Runtime (Windows)
        if: steps.preflight.outputs.enabled == 'true' && steps.auth-mode.outputs.mode != 'none'
        env:
          AOP_DEFAULT_API_BASE_URL: ${{ vars.KARAXAS_BACKEND_OPS_URL }}
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command ". '{0}'"
        run: |
          cargo build -p launcher-app --release --target x86_64-pc-windows-msvc

      - name: Package Rust Game Client Artifact
        if: steps.preflight.outputs.enabled == 'true' && steps.auth-mode.outputs.mode != 'none'
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command ". '{0}'"
        run: |
          python tools/package_client_app_release.py `
            --version "${{ steps.get-version.outputs.version }}" `
            --exe "target/x86_64-pc-windows-msvc/release/client-app.exe" `
            --output-dir "releases/game"

      - name: Package Designer Client Artifact
        if: steps.preflight.outputs.enabled == 'true' && steps.auth-mode.outputs.mode != 'none'
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command ". '{0}'"
        run: |
          python tools/package_designer_client_release.py `
            --version "${{ steps.get-version.outputs.version }}" `
            --output-dir "releases/designer"

      - name: Build Game Installer Artifact
        if: steps.preflight.outputs.enabled == 'true' && steps.auth-mode.outputs.mode != 'none'
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command ". '{0}'"
        run: |
          $gameVersion = "${{ steps.get-version.outputs.version }}"
          $runtimeZip = "releases/game/AmbitionsOfPeace-client-app-win-x64-$gameVersion.zip"
          if (-not (Test-Path $runtimeZip)) {
            throw "Missing runtime zip needed for installer packaging: $runtimeZip"
          }
          powershell -ExecutionPolicy Bypass -File "scripts/build_game_installer.ps1" `
            -Version $gameVersion `
            -RuntimeZip $runtimeZip `
            -LauncherExe "target/x86_64-pc-windows-msvc/release/launcher-app.exe" `
            -OutputDir "releases/game"

      - name: Build Runtime Delta Artifacts
        if: steps.preflight.outputs.enabled == 'true' && steps.auth-mode.outputs.mode != 'none'
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command ". '{0}'"
        run: |
          $version = "${{ steps.get-version.outputs.version }}"
          $runtimeZip = "releases/game/AmbitionsOfPeace-client-app-win-x64-$version.zip"
          if (-not (Test-Path $runtimeZip)) {
            throw "Missing runtime zip for delta generation: $runtimeZip"
          }

          $deltaBaseDir = "releases/game/_delta_bases"
          if (Test-Path $deltaBaseDir) {
            Remove-Item -Path $deltaBaseDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $deltaBaseDir -Force | Out-Null

          $feedPrefix = "gs://${{ env.GCS_RELEASE_BUCKET }}/${{ steps.preflight.outputs.game_prefix }}"
          $runtimePattern = "$feedPrefix/AmbitionsOfPeace-client-app-win-x64-*.zip"
          $existing = & gsutil ls $runtimePattern 2>$null
          $entries = @()
          $versionRegex = [regex]'AmbitionsOfPeace-client-app-win-x64-(\d+\.\d+\.\d+)\.zip$'
          foreach ($path in $existing) {
            $trimmed = $path.Trim()
            if ([string]::IsNullOrWhiteSpace($trimmed)) {
              continue
            }
            $match = $versionRegex.Match($trimmed)
            if (-not $match.Success) {
              continue
            }
            $fromVersion = $match.Groups[1].Value
            if ($fromVersion -eq $version) {
              continue
            }
            try {
              $versionObj = [version]$fromVersion
            } catch {
              continue
            }
            $entries += [PSCustomObject]@{ Path = $trimmed; VersionText = $fromVersion; Version = $versionObj }
          }

          $candidates = $entries | Sort-Object Version -Descending | Select-Object -First 3
          foreach ($candidate in $candidates) {
            $fromVersion = $candidate.VersionText
            $fromZipLocal = Join-Path $deltaBaseDir "AmbitionsOfPeace-client-app-win-x64-$fromVersion.zip"
            & gsutil cp $candidate.Path $fromZipLocal
            if ($LASTEXITCODE -ne 0) {
              throw "Failed downloading base runtime zip for delta: $($candidate.Path)"
            }

            python tools/build_runtime_delta.py `
              --from-version $fromVersion `
              --to-version $version `
              --from-zip $fromZipLocal `
              --to-zip $runtimeZip `
              --output-dir "releases/game"
          }

          if (Test-Path $deltaBaseDir) {
            Remove-Item -Path $deltaBaseDir -Recurse -Force
          }

      - name: Verify Release Artifacts
        if: steps.preflight.outputs.enabled == 'true' && steps.auth-mode.outputs.mode != 'none'
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command ". '{0}'"
        run: |
          $gameZip = Get-ChildItem "releases/game" -Filter "AmbitionsOfPeace-client-app-win-x64-*.zip" -ErrorAction SilentlyContinue
          if (-not $gameZip -or $gameZip.Count -eq 0) { throw "Missing game client zip artifact" }
          $gameManifest = Get-ChildItem "releases/game" -Filter "AmbitionsOfPeace-client-app-win-x64-*.manifest.json" -ErrorAction SilentlyContinue
          if (-not $gameManifest -or $gameManifest.Count -eq 0) { throw "Missing game client manifest artifact" }
          $gameChecksum = Get-ChildItem "releases/game" -Filter "AmbitionsOfPeace-client-app-win-x64-*.sha256" -ErrorAction SilentlyContinue
          if (-not $gameChecksum -or $gameChecksum.Count -eq 0) { throw "Missing game client checksum artifact" }
          $gameInstaller = Get-ChildItem "releases/game" -Filter "AmbitionsOfPeace-game-installer-win-x64-*.exe" -ErrorAction SilentlyContinue
          if (-not $gameInstaller -or $gameInstaller.Count -eq 0) { throw "Missing game installer artifact" }
          $gameInstallerChecksum = Get-ChildItem "releases/game" -Filter "AmbitionsOfPeace-game-installer-win-x64-*.sha256" -ErrorAction SilentlyContinue
          if (-not $gameInstallerChecksum -or $gameInstallerChecksum.Count -eq 0) { throw "Missing game installer checksum artifact" }

          $designerZip = Get-ChildItem "releases/designer" -Filter "AmbitionsOfPeace-designer-client-win-x64-*.zip" -ErrorAction SilentlyContinue
          if (-not $designerZip -or $designerZip.Count -eq 0) { throw "Missing designer client zip artifact" }
          $designerManifest = Get-ChildItem "releases/designer" -Filter "AmbitionsOfPeace-designer-client-win-x64-*.manifest.json" -ErrorAction SilentlyContinue
          if (-not $designerManifest -or $designerManifest.Count -eq 0) { throw "Missing designer client manifest artifact" }
          $designerChecksum = Get-ChildItem "releases/designer" -Filter "AmbitionsOfPeace-designer-client-win-x64-*.sha256" -ErrorAction SilentlyContinue
          if (-not $designerChecksum -or $designerChecksum.Count -eq 0) { throw "Missing designer client checksum artifact" }

      - name: Prepare Windows Installer Smoke Feeds
        if: steps.preflight.outputs.enabled == 'true' && steps.auth-mode.outputs.mode != 'none'
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command ". '{0}'"
        run: |
          if (Test-Path "windows-smoke") {
            Remove-Item -Path "windows-smoke" -Recurse -Force
          }
          New-Item -ItemType Directory -Path "windows-smoke/win-game" -Force | Out-Null
          New-Item -ItemType Directory -Path "windows-smoke/win-designer" -Force | Out-Null

          python tools/package_client_app_release.py `
            --version "0.0.0" `
            --exe "target/x86_64-pc-windows-msvc/release/client-app.exe" `
            --output-dir "windows-smoke/win-game"
          powershell -ExecutionPolicy Bypass -File "scripts/build_game_installer.ps1" `
            -Version "0.0.0" `
            -RuntimeZip "windows-smoke/win-game/AmbitionsOfPeace-client-app-win-x64-0.0.0.zip" `
            -LauncherExe "target/x86_64-pc-windows-msvc/release/launcher-app.exe" `
            -OutputDir "windows-smoke/win-game"
          python tools/package_designer_client_release.py `
            --version "0.0.0" `
            --output-dir "windows-smoke/win-designer"

          Copy-Item "releases/game/*" "windows-smoke/win-game/" -Force
          Copy-Item "releases/designer/*" "windows-smoke/win-designer/" -Force

      - name: Windows Installer Acceptance Smoke
        if: steps.preflight.outputs.enabled == 'true' && steps.auth-mode.outputs.mode != 'none'
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command ". '{0}'"
        run: |
          powershell -ExecutionPolicy Bypass -File "scripts/windows_installer_acceptance_smoke.ps1" `
            -FeedRoot "windows-smoke" `
            -GameFromVersion "0.0.0" `
            -GameToVersion "${{ steps.get-version.outputs.version }}" `
            -DesignerFromVersion "0.0.0" `
            -DesignerToVersion "${{ steps.get-version.outputs.version }}" `
            -SummaryPath "windows-smoke/windows-installer-smoke-summary.md"

      - name: Gameplay/Handoff Acceptance Gates
        if: steps.preflight.outputs.enabled == 'true' && steps.auth-mode.outputs.mode != 'none'
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command ". '{0}'"
        env:
          PYTHONPATH: backend
        run: |
          python -m pytest -q backend/tests/test_security_edges.py backend/tests/test_publish_drain.py backend/tests/test_world_bootstrap_3d_contract.py backend/tests/test_vertical_slice_loop.py backend/tests/test_battle_commands.py backend/tests/test_domain_actions.py
          cargo test -p client-app --features bootstrap-shell
          Add-Content -Path "windows-smoke/windows-installer-smoke-summary.md" -Value ""
          Add-Content -Path "windows-smoke/windows-installer-smoke-summary.md" -Value "- Gameplay/handoff acceptance gates: PASS"

      - name: External PoC Release Gate Evidence Check
        if: steps.preflight.outputs.enabled == 'true' && steps.auth-mode.outputs.mode != 'none'
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command ". '{0}'"
        run: |
          python backend/scripts/validate_external_poc_release_gate.py --gate-pointer docs/release-gates/current_gate.json
          Add-Content -Path "windows-smoke/windows-installer-smoke-summary.md" -Value "- External PoC release gate evidence: PASS"

      - name: Upload Windows Smoke Summary
        if: always() && steps.preflight.outputs.enabled == 'true' && steps.auth-mode.outputs.mode != 'none'
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-smoke-summary
          path: windows-smoke/windows-installer-smoke-summary.md
          if-no-files-found: warn

      - name: Upload Game Channel Artifacts To GCS
        if: steps.preflight.outputs.enabled == 'true' && steps.auth-mode.outputs.mode != 'none'
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command ". '{0}'"
        run: |
          $feedPrefix = "gs://${{ env.GCS_RELEASE_BUCKET }}/${{ steps.preflight.outputs.game_prefix }}"
          $archivePrefix = "gs://${{ env.GCS_RELEASE_BUCKET }}/archive/game/${{ steps.get-version.outputs.version }}"
          $version = "${{ steps.get-version.outputs.version }}"
          $installerBase = "AmbitionsOfPeace-game-installer-win-x64-$version"
          $installerExe = "releases/game/$installerBase.exe"
          $installerSha = "releases/game/$installerBase.sha256"
          $runtimeBase = "AmbitionsOfPeace-client-app-win-x64-$version"
          $runtimeZip = "releases/game/$runtimeBase.zip"
          $runtimeManifest = "releases/game/$runtimeBase.manifest.json"
          $runtimeSha = "releases/game/$runtimeBase.sha256"
          if (-not (Test-Path $installerExe)) { throw "Missing installer executable: $installerExe" }
          if (-not (Test-Path $installerSha)) { throw "Missing installer checksum: $installerSha" }
          if (-not (Test-Path $runtimeZip)) { throw "Missing runtime zip: $runtimeZip" }
          if (-not (Test-Path $runtimeManifest)) { throw "Missing runtime manifest: $runtimeManifest" }
          if (-not (Test-Path $runtimeSha)) { throw "Missing runtime checksum: $runtimeSha" }
          gsutil cp $installerExe "$feedPrefix/"
          gsutil cp $installerSha "$feedPrefix/"
          gsutil cp $runtimeZip "$feedPrefix/"
          gsutil cp $runtimeManifest "$feedPrefix/"
          gsutil cp $runtimeSha "$feedPrefix/"
          gsutil cp $installerExe "$archivePrefix/"
          gsutil cp $installerSha "$archivePrefix/"
          gsutil cp $runtimeZip "$archivePrefix/"
          gsutil cp $runtimeManifest "$archivePrefix/"
          gsutil cp $runtimeSha "$archivePrefix/"

          $deltaEntries = @()
          $deltaZips = Get-ChildItem "releases/game" -Filter "AmbitionsOfPeace-client-delta-$version-from-*.zip" -ErrorAction SilentlyContinue
          foreach ($deltaZip in $deltaZips) {
            $deltaPath = $deltaZip.FullName
            $deltaShaName = "$($deltaZip.BaseName).sha256"
            $deltaShaPath = Join-Path "releases/game" $deltaShaName
            if (-not (Test-Path $deltaShaPath)) {
              throw "Missing delta checksum: $deltaShaPath"
            }

            gsutil cp $deltaPath "$feedPrefix/"
            gsutil cp $deltaShaPath "$feedPrefix/"
            gsutil cp $deltaPath "$archivePrefix/"
            gsutil cp $deltaShaPath "$archivePrefix/"

            $fromMatch = [regex]::Match($deltaZip.BaseName, "from-(\d+\.\d+\.\d+)$")
            if ($fromMatch.Success) {
              $deltaEntries += @{
                from_version = $fromMatch.Groups[1].Value
                artifact = $deltaZip.Name
                checksum = $deltaShaName
              }
            }
          }
          $latestPath = "releases/game/latest.json"
          $latestPayload = @{
            version = $version
            channel = "game"
            artifact_prefix = "AmbitionsOfPeace-game-installer-win-x64"
            installer_artifact = "$installerBase.exe"
            installer_checksum = "$installerBase.sha256"
            runtime_artifact = "$runtimeBase.zip"
            runtime_manifest = "$runtimeBase.manifest.json"
            runtime_checksum = "$runtimeBase.sha256"
            deltas = $deltaEntries
          } | ConvertTo-Json -Depth 8
          Set-Content -Path $latestPath -Value $latestPayload -Encoding utf8
          gsutil cp $latestPath "$feedPrefix/latest.json"
          gsutil setmeta -h "Cache-Control:no-cache, max-age=0" "$feedPrefix/latest.json"

      - name: Upload Designer Channel Artifacts To GCS
        if: steps.preflight.outputs.enabled == 'true' && steps.auth-mode.outputs.mode != 'none'
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command ". '{0}'"
        run: |
          $feedPrefix = "gs://${{ env.GCS_RELEASE_BUCKET }}/${{ steps.preflight.outputs.designer_prefix }}"
          $archivePrefix = "gs://${{ env.GCS_RELEASE_BUCKET }}/archive/designer/${{ steps.get-version.outputs.version }}"
          gsutil -m cp "releases/designer/*" "$feedPrefix/"
          gsutil -m cp "releases/designer/*" "$archivePrefix/"
          $latestPath = "releases/designer/latest.json"
          $latestPayload = @{
            version = "${{ steps.get-version.outputs.version }}"
            channel = "designer"
            artifact_prefix = "AmbitionsOfPeace-designer-client-win-x64"
          } | ConvertTo-Json
          Set-Content -Path $latestPath -Value $latestPayload -Encoding utf8
          gsutil cp $latestPath "$feedPrefix/latest.json"
          gsutil setmeta -h "Cache-Control:no-cache, max-age=0" "$feedPrefix/latest.json"

      - name: Prune Older Release Artifacts From GCS
        if: steps.preflight.outputs.enabled == 'true' && steps.auth-mode.outputs.mode != 'none'
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command ". '{0}'"
        run: |
          $PSNativeCommandUseErrorActionPreference = $false
          $keepVersionCount = 3
          if ($keepVersionCount -lt 1) {
            Write-Host "Invalid keep count configured ($keepVersionCount); skipping prune step."
            exit 0
          }

          $versionRegex = [regex]'\d+\.\d+\.\d+'

          function Prune-FeedArtifacts {
            param(
              [string]$feedPrefix,
              [string[]]$artifactPatterns
            )

            $versionBuckets = @{}
            foreach ($artifactPattern in $artifactPatterns) {
              $pattern = "$feedPrefix/$artifactPattern"
              $artifactPaths = & gsutil ls $pattern 2>$null
              if ($LASTEXITCODE -ne 0 -or -not $artifactPaths) {
                continue
              }
              foreach ($artifact in $artifactPaths) {
                $artifactPath = $artifact.Trim()
                if ([string]::IsNullOrWhiteSpace($artifactPath)) {
                  continue
                }
                $match = $versionRegex.Match($artifactPath)
                if (-not $match.Success) {
                  continue
                }
                $versionText = $match.Value
                try {
                  $versionObj = [version]$versionText
                } catch {
                  continue
                }
                if (-not $versionBuckets.ContainsKey($versionText)) {
                  $versionBuckets[$versionText] = @{ Version = $versionObj; Paths = @() }
                }
                $versionBuckets[$versionText].Paths += $artifactPath
              }
            }

            if ($versionBuckets.Count -eq 0) {
              Write-Host "No artifacts found to prune for $feedPrefix"
              return
            }

            $orderedVersions = $versionBuckets.GetEnumerator() | Sort-Object { $_.Value.Version } -Descending
            $keepVersions = $orderedVersions | Select-Object -First $keepVersionCount | ForEach-Object { $_.Key }
            $keepSet = @{}
            foreach ($keepVersion in $keepVersions) {
              $keepSet[$keepVersion] = $true
            }

            foreach ($entry in $orderedVersions) {
              if ($keepSet.ContainsKey($entry.Key)) {
                continue
              }
              foreach ($path in $entry.Value.Paths | Sort-Object -Unique) {
                Write-Host "Removing stale artifact: $path"
                & gsutil rm $path
              }
            }
          }

          function Prune-ArchiveVersions {
            param([string]$archiveRoot)
            $prefixes = & gsutil ls "$archiveRoot/" 2>$null
            if ($LASTEXITCODE -ne 0 -or -not $prefixes) {
              Write-Host "No archive prefixes found to prune in $archiveRoot"
              return
            }

            $entries = @()
            foreach ($prefix in $prefixes) {
              $trimmed = $prefix.Trim()
              if ([string]::IsNullOrWhiteSpace($trimmed) -or -not $trimmed.EndsWith('/')) {
                continue
              }
              $versionName = $trimmed.TrimEnd('/').Split('/')[-1]
              try {
                $versionObj = [version]$versionName
              } catch {
                continue
              }
              $entries += [PSCustomObject]@{ Prefix = $trimmed; VersionName = $versionName; Version = $versionObj }
            }

            $ordered = $entries | Sort-Object Version -Descending
            $keep = $ordered | Select-Object -First $keepVersionCount
            $keepSet = @{}
            foreach ($entry in $keep) {
              $keepSet[$entry.VersionName] = $true
            }
            foreach ($entry in $ordered) {
              if ($keepSet.ContainsKey($entry.VersionName)) {
                continue
              }
              Write-Host "Removing stale archive prefix: $($entry.Prefix)"
              & gsutil -m rm -r $entry.Prefix
            }
          }

          $gameFeed = "gs://${{ env.GCS_RELEASE_BUCKET }}/${{ steps.preflight.outputs.game_prefix }}"
          $designerFeed = "gs://${{ env.GCS_RELEASE_BUCKET }}/${{ steps.preflight.outputs.designer_prefix }}"
          Prune-FeedArtifacts -feedPrefix $gameFeed -artifactPatterns @(
            "AmbitionsOfPeace-game-installer-win-x64-*.exe",
            "AmbitionsOfPeace-game-installer-win-x64-*.sha256",
            "AmbitionsOfPeace-client-app-win-x64-*.zip",
            "AmbitionsOfPeace-client-app-win-x64-*.manifest.json",
            "AmbitionsOfPeace-client-app-win-x64-*.sha256",
            "AmbitionsOfPeace-client-delta-*.zip",
            "AmbitionsOfPeace-client-delta-*.sha256"
          )
          Prune-FeedArtifacts -feedPrefix $designerFeed -artifactPatterns @(
            "AmbitionsOfPeace-designer-client-win-x64-*.zip",
            "AmbitionsOfPeace-designer-client-win-x64-*.manifest.json",
            "AmbitionsOfPeace-designer-client-win-x64-*.sha256"
          )

          Prune-ArchiveVersions -archiveRoot "gs://${{ env.GCS_RELEASE_BUCKET }}/archive/game"
          Prune-ArchiveVersions -archiveRoot "gs://${{ env.GCS_RELEASE_BUCKET }}/archive/designer"

      - name: Skip Release (Missing Inputs/Auth)
        if: steps.preflight.outputs.enabled != 'true' || steps.auth-mode.outputs.mode == 'none'
        run: echo "Release workflow skipped because GCS bucket or cloud auth is not configured."
