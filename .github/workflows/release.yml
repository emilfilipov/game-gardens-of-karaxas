name: Release

on:
  push:
    branches:
      - main
      - master
    paths:
      - "client-app/**"
      - "designer-client/**"
      - "sim-core/**"
      - "tooling-core/**"
      - "assets/content/**"
      - "scripts/**"
      - "tools/package_client_app_release.py"
      - "tools/package_designer_client_release.py"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: windows-latest
    env:
      GCS_RELEASE_BUCKET: ${{ vars.KARAXAS_GCS_RELEASE_BUCKET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preflight Release Inputs
        id: preflight
        shell: pwsh
        run: |
          $gamePrefix = "${{ vars.KARAXAS_GCS_GAME_RELEASE_PREFIX }}"
          if ([string]::IsNullOrWhiteSpace($gamePrefix)) {
            $gamePrefix = "win-game"
          }
          $designerPrefix = "${{ vars.KARAXAS_GCS_DESIGNER_RELEASE_PREFIX }}"
          if ([string]::IsNullOrWhiteSpace($designerPrefix)) {
            $designerPrefix = "win-designer"
          }
          $hasBucket = -not [string]::IsNullOrWhiteSpace("${{ env.GCS_RELEASE_BUCKET }}")
          if ($hasBucket) {
            "enabled=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            "game_prefix=$gamePrefix" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            "designer_prefix=$designerPrefix" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            "game_feed_url=https://storage.googleapis.com/${{ env.GCS_RELEASE_BUCKET }}/$gamePrefix" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            "designer_feed_url=https://storage.googleapis.com/${{ env.GCS_RELEASE_BUCKET }}/$designerPrefix" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          } else {
            Write-Host "Missing KARAXAS_GCS_RELEASE_BUCKET variable. Release workflow will skip publishing."
            "enabled=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            "game_prefix=$gamePrefix" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            "designer_prefix=$designerPrefix" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            "game_feed_url=" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            "designer_feed_url=" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          }

      - name: Resolve Auth Mode
        id: auth-mode
        if: steps.preflight.outputs.enabled == 'true'
        shell: pwsh
        run: |
          if ("${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}" -ne "" -and "${{ secrets.GCP_SERVICE_ACCOUNT }}" -ne "") {
            "mode=wif" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          } else {
            "mode=none" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          }

      - name: Authenticate to Google Cloud (WIF)
        if: steps.preflight.outputs.enabled == 'true' && steps.auth-mode.outputs.mode == 'wif'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        if: steps.preflight.outputs.enabled == 'true' && steps.auth-mode.outputs.mode != 'none'
        uses: google-github-actions/setup-gcloud@v2

      - name: Compute Version
        id: get-version
        if: steps.preflight.outputs.enabled == 'true' && steps.auth-mode.outputs.mode != 'none'
        shell: pwsh
        run: |
          $version = "1.0.$env:GITHUB_RUN_NUMBER"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Setup Rust
        if: steps.preflight.outputs.enabled == 'true' && steps.auth-mode.outputs.mode != 'none'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Python
        if: steps.preflight.outputs.enabled == 'true' && steps.auth-mode.outputs.mode != 'none'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Auth/session continuity gate
        if: steps.preflight.outputs.enabled == 'true' && steps.auth-mode.outputs.mode != 'none'
        shell: pwsh
        env:
          PYTHONPATH: backend
        run: |
          pip install -r backend/requirements.txt
          pip install pytest
          python -m pytest -q backend/tests/test_security_edges.py backend/tests/test_publish_drain.py

      - name: Build Rust Game Client Runtime (Windows)
        if: steps.preflight.outputs.enabled == 'true' && steps.auth-mode.outputs.mode != 'none'
        shell: pwsh
        run: |
          cargo build -p client-app --release --features bootstrap-shell --target x86_64-pc-windows-msvc

      - name: Package Rust Game Client Artifact
        if: steps.preflight.outputs.enabled == 'true' && steps.auth-mode.outputs.mode != 'none'
        shell: pwsh
        run: |
          python tools/package_client_app_release.py `
            --version "${{ steps.get-version.outputs.version }}" `
            --exe "target/x86_64-pc-windows-msvc/release/client-app.exe" `
            --output-dir "releases/game"

      - name: Package Designer Client Artifact
        if: steps.preflight.outputs.enabled == 'true' && steps.auth-mode.outputs.mode != 'none'
        shell: pwsh
        run: |
          python tools/package_designer_client_release.py `
            --version "${{ steps.get-version.outputs.version }}" `
            --output-dir "releases/designer"

      - name: Verify Release Artifacts
        if: steps.preflight.outputs.enabled == 'true' && steps.auth-mode.outputs.mode != 'none'
        shell: pwsh
        run: |
          $gameZip = Get-ChildItem "releases/game" -Filter "AmbitionsOfPeace-client-app-win-x64-*.zip" -ErrorAction SilentlyContinue
          if (-not $gameZip -or $gameZip.Count -eq 0) { throw "Missing game client zip artifact" }
          $gameManifest = Get-ChildItem "releases/game" -Filter "AmbitionsOfPeace-client-app-win-x64-*.manifest.json" -ErrorAction SilentlyContinue
          if (-not $gameManifest -or $gameManifest.Count -eq 0) { throw "Missing game client manifest artifact" }
          $gameChecksum = Get-ChildItem "releases/game" -Filter "AmbitionsOfPeace-client-app-win-x64-*.sha256" -ErrorAction SilentlyContinue
          if (-not $gameChecksum -or $gameChecksum.Count -eq 0) { throw "Missing game client checksum artifact" }

          $designerZip = Get-ChildItem "releases/designer" -Filter "AmbitionsOfPeace-designer-client-win-x64-*.zip" -ErrorAction SilentlyContinue
          if (-not $designerZip -or $designerZip.Count -eq 0) { throw "Missing designer client zip artifact" }
          $designerManifest = Get-ChildItem "releases/designer" -Filter "AmbitionsOfPeace-designer-client-win-x64-*.manifest.json" -ErrorAction SilentlyContinue
          if (-not $designerManifest -or $designerManifest.Count -eq 0) { throw "Missing designer client manifest artifact" }
          $designerChecksum = Get-ChildItem "releases/designer" -Filter "AmbitionsOfPeace-designer-client-win-x64-*.sha256" -ErrorAction SilentlyContinue
          if (-not $designerChecksum -or $designerChecksum.Count -eq 0) { throw "Missing designer client checksum artifact" }

      - name: Upload Game Channel Artifacts To GCS
        if: steps.preflight.outputs.enabled == 'true' && steps.auth-mode.outputs.mode != 'none'
        shell: pwsh
        run: |
          $feedPrefix = "gs://${{ env.GCS_RELEASE_BUCKET }}/${{ steps.preflight.outputs.game_prefix }}"
          $archivePrefix = "gs://${{ env.GCS_RELEASE_BUCKET }}/archive/game/${{ steps.get-version.outputs.version }}"
          gsutil -m cp "releases/game/*" "$feedPrefix/"
          gsutil -m cp "releases/game/*" "$archivePrefix/"
          $latestPath = "releases/game/latest.json"
          $latestPayload = @{
            version = "${{ steps.get-version.outputs.version }}"
            channel = "game"
            artifact_prefix = "AmbitionsOfPeace-client-app-win-x64"
          } | ConvertTo-Json
          Set-Content -Path $latestPath -Value $latestPayload -Encoding utf8
          gsutil cp $latestPath "$feedPrefix/latest.json"
          gsutil setmeta -h "Cache-Control:no-cache, max-age=0" "$feedPrefix/latest.json"

      - name: Upload Designer Channel Artifacts To GCS
        if: steps.preflight.outputs.enabled == 'true' && steps.auth-mode.outputs.mode != 'none'
        shell: pwsh
        run: |
          $feedPrefix = "gs://${{ env.GCS_RELEASE_BUCKET }}/${{ steps.preflight.outputs.designer_prefix }}"
          $archivePrefix = "gs://${{ env.GCS_RELEASE_BUCKET }}/archive/designer/${{ steps.get-version.outputs.version }}"
          gsutil -m cp "releases/designer/*" "$feedPrefix/"
          gsutil -m cp "releases/designer/*" "$archivePrefix/"
          $latestPath = "releases/designer/latest.json"
          $latestPayload = @{
            version = "${{ steps.get-version.outputs.version }}"
            channel = "designer"
            artifact_prefix = "AmbitionsOfPeace-designer-client-win-x64"
          } | ConvertTo-Json
          Set-Content -Path $latestPath -Value $latestPayload -Encoding utf8
          gsutil cp $latestPath "$feedPrefix/latest.json"
          gsutil setmeta -h "Cache-Control:no-cache, max-age=0" "$feedPrefix/latest.json"

      - name: Prune Older Release Artifacts From GCS
        if: steps.preflight.outputs.enabled == 'true' && steps.auth-mode.outputs.mode != 'none'
        shell: pwsh
        run: |
          $PSNativeCommandUseErrorActionPreference = $false
          $keepVersionCount = 3
          if ($keepVersionCount -lt 1) {
            Write-Host "Invalid keep count configured ($keepVersionCount); skipping prune step."
            exit 0
          }

          $versionRegex = [regex]'\d+\.\d+\.\d+'

          function Prune-FeedArtifacts {
            param(
              [string]$feedPrefix,
              [string]$artifactPrefix
            )

            $patterns = @(
              "$feedPrefix/$artifactPrefix-*.zip",
              "$feedPrefix/$artifactPrefix-*.manifest.json",
              "$feedPrefix/$artifactPrefix-*.sha256"
            )
            $versionBuckets = @{}
            foreach ($pattern in $patterns) {
              $artifactPaths = & gsutil ls $pattern 2>$null
              if ($LASTEXITCODE -ne 0 -or -not $artifactPaths) {
                continue
              }
              foreach ($artifact in $artifactPaths) {
                $artifactPath = $artifact.Trim()
                if ([string]::IsNullOrWhiteSpace($artifactPath)) {
                  continue
                }
                $match = $versionRegex.Match($artifactPath)
                if (-not $match.Success) {
                  continue
                }
                $versionText = $match.Value
                try {
                  $versionObj = [version]$versionText
                } catch {
                  continue
                }
                if (-not $versionBuckets.ContainsKey($versionText)) {
                  $versionBuckets[$versionText] = @{ Version = $versionObj; Paths = @() }
                }
                $versionBuckets[$versionText].Paths += $artifactPath
              }
            }

            if ($versionBuckets.Count -eq 0) {
              Write-Host "No artifacts found to prune for $feedPrefix"
              return
            }

            $orderedVersions = $versionBuckets.GetEnumerator() | Sort-Object { $_.Value.Version } -Descending
            $keepVersions = $orderedVersions | Select-Object -First $keepVersionCount | ForEach-Object { $_.Key }
            $keepSet = @{}
            foreach ($keepVersion in $keepVersions) {
              $keepSet[$keepVersion] = $true
            }

            foreach ($entry in $orderedVersions) {
              if ($keepSet.ContainsKey($entry.Key)) {
                continue
              }
              foreach ($path in $entry.Value.Paths | Sort-Object -Unique) {
                Write-Host "Removing stale artifact: $path"
                & gsutil rm $path
              }
            }
          }

          function Prune-ArchiveVersions {
            param([string]$archiveRoot)
            $prefixes = & gsutil ls "$archiveRoot/" 2>$null
            if ($LASTEXITCODE -ne 0 -or -not $prefixes) {
              Write-Host "No archive prefixes found to prune in $archiveRoot"
              return
            }

            $entries = @()
            foreach ($prefix in $prefixes) {
              $trimmed = $prefix.Trim()
              if ([string]::IsNullOrWhiteSpace($trimmed) -or -not $trimmed.EndsWith('/')) {
                continue
              }
              $versionName = $trimmed.TrimEnd('/').Split('/')[-1]
              try {
                $versionObj = [version]$versionName
              } catch {
                continue
              }
              $entries += [PSCustomObject]@{ Prefix = $trimmed; VersionName = $versionName; Version = $versionObj }
            }

            $ordered = $entries | Sort-Object Version -Descending
            $keep = $ordered | Select-Object -First $keepVersionCount
            $keepSet = @{}
            foreach ($entry in $keep) {
              $keepSet[$entry.VersionName] = $true
            }
            foreach ($entry in $ordered) {
              if ($keepSet.ContainsKey($entry.VersionName)) {
                continue
              }
              Write-Host "Removing stale archive prefix: $($entry.Prefix)"
              & gsutil -m rm -r $entry.Prefix
            }
          }

          $gameFeed = "gs://${{ env.GCS_RELEASE_BUCKET }}/${{ steps.preflight.outputs.game_prefix }}"
          $designerFeed = "gs://${{ env.GCS_RELEASE_BUCKET }}/${{ steps.preflight.outputs.designer_prefix }}"
          Prune-FeedArtifacts -feedPrefix $gameFeed -artifactPrefix "AmbitionsOfPeace-client-app-win-x64"
          Prune-FeedArtifacts -feedPrefix $designerFeed -artifactPrefix "AmbitionsOfPeace-designer-client-win-x64"

          Prune-ArchiveVersions -archiveRoot "gs://${{ env.GCS_RELEASE_BUCKET }}/archive/game"
          Prune-ArchiveVersions -archiveRoot "gs://${{ env.GCS_RELEASE_BUCKET }}/archive/designer"

      - name: Skip Release (Missing Inputs/Auth)
        if: steps.preflight.outputs.enabled != 'true' || steps.auth-mode.outputs.mode == 'none'
        run: echo "Release workflow skipped because GCS bucket or cloud auth is not configured."
